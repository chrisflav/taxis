<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>taxis</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#5B46D9" />
    <script>
      // Resolve the theme before the first paint. Doing this in React would show a light frame to
      // anyone who prefers dark, and doing it in a CSS media query would leave no way to override
      // the system. So `data-theme` is always set, here, and the stylesheet only reads it.
      (function () {
        try {
          var stored = localStorage.getItem("taxis:theme");
          var dark = stored === "dark"
            || (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <script>
      // Ask for the page's data before the application exists.
      //
      // Every request the app makes is issued by code inside the bundle, so none of them could
      // start until the bundle had arrived, been parsed and run — on a 50 kbit/s link that is six
      // seconds of a twelve-second load during which the connection is busy with JavaScript and
      // the server has been told nothing about what page is being opened. These are the same URLs
      // `main.tsx` asks for; firing them here overlaps them with the download of the code that
      // will render them, and `cache.ts` adopts whatever is already in flight (`__taxisPreload`).
      //
      // Deliberately only the requests whose URL is knowable without the application's own logic.
      // A guessed URL is not a free bet: on a link this slow, prefetching the wrong list query
      // costs the reader real seconds. The list's query is not guessed — it is replayed from the
      // one the app last used, which the app records for exactly this purpose.
      (function () {
        var preload = (window.__taxisPreload = {});
        function get(path) {
          if (preload[path]) return;
          preload[path] = fetch(path, {
            credentials: "include",
            headers: { "Content-Type": "application/json" },
          }).then(function (res) {
            return res.text().then(function (text) {
              var data = text ? JSON.parse(text) : null;
              if (!res.ok) throw new Error((data && data.error) || res.statusText);
              return data;
            });
          }).catch(function (e) {
            // Leave no poisoned entry behind: the application re-requests normally.
            delete preload[path];
            throw e;
          });
        }
        // Who is signed in, and the reference data every view names things with.
        get("/api/session");
        get("/api/labels");
        get("/api/actors");
        var hash = window.location.hash || "";
        var issue = hash.match(/^#\/issues\/(\d+)/);
        if (issue) {
          // `CHILDREN_PAGE_SIZE` in api.ts. A fixed query, so there is nothing to get wrong.
          get("/api/issues/" + issue[1]);
          get("/api/issues/page?parent=" + issue[1] + "&limit=100");
        } else if (hash.indexOf("#/graph") === 0) {
          get("/api/graph");
        } else if (hash.indexOf("#/repos") === 0) {
          get("/api/repo-graph");
        } else if (hash.indexOf("#/labels") !== 0) {
          // The issue list. Its query depends on filters and a sort that live in the app and in
          // localStorage, so rather than reimplement that here — and drift from it — the app
          // writes down the path it last read, and this replays it. Worst case after a filter
          // change: one page fetched that the app then asks for under a different name.
          var last = null;
          try { last = localStorage.getItem("taxis:list-query"); } catch (e) { /* private mode */ }
          get("/api" + (last || "/issues/page?state=open&sort=id&limit=200"));
        }
      })();
    </script>
  </head>
  <body>
    <!-- The page frame, drawn before a byte of JavaScript has run.
         React clears whatever is in the root container on its first render, so this is a plain
         placeholder with no handover to arrange: the stylesheet in <head> is render-blocking and
         has already applied, so the bar below lands in its final position and the application
         mounts into the same frame rather than replacing a blank page with a whole one.
         It is worth the duplication of the bar's markup (the copy that matters lives in App.tsx,
         and only the frame is repeated here — no active tab, no account controls, nothing that
         depends on who is signed in or where they are) because the alternative is showing nothing
         at all until ~80 KB of compressed JavaScript has been fetched, parsed and run. -->
    <div id="root">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="wordmark" href="#/issues" aria-label="taxis — all issues">
            <svg viewBox="0 0 32 32" width="19" height="19" aria-hidden="true">
              <rect width="32" height="32" rx="7" fill="var(--accent)" />
              <g fill="var(--accent-fg)">
                <rect x="10" y="7.5" width="3.6" height="17" rx="1.8" />
                <rect x="10" y="14.2" width="12" height="3.6" rx="1.8" />
              </g>
            </svg>
            <span>taxis</span>
          </a>
          <nav aria-label="Main">
            <a href="#/issues">Issues</a>
            <a href="#/graph">Graph</a>
            <a href="#/repos">Repos</a>
            <a href="#/labels">Labels</a>
          </nav>
          <div class="spacer"></div>
        </div>
      </header>
      <main aria-busy="true">
        <span class="skeleton-line" style="width: 18ch"></span>
        <span class="skeleton-line" style="width: 32ch; height: 1.3em; margin-top: 1em"></span>
        <div class="panel" style="margin-top: 14px">
          <span class="skeleton-line" style="width: 100%"></span>
          <span class="skeleton-line" style="width: 97%"></span>
          <span class="skeleton-line" style="width: 62%"></span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
