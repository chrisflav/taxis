name: taxis

services:
  taxis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: taxis:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      # Public URL the server is reached at — required for the Google OAuth redirect URI to be
      # correct, and used to build absolute links. If you override HOST_PORT (or put this behind a
      # different host/port entirely), override this to match.
      ISSUES_BASE_URL: ${ISSUES_BASE_URL:-http://localhost:8080}
      # Comma-separated emails granted admin on first login.
      ISSUES_ADMIN_EMAILS: ${ISSUES_ADMIN_EMAILS:-}
      # Set to enable single-password sign-in instead of/alongside Google OAuth.
      ISSUES_CENTRAL_PASSWORD: ${ISSUES_CENTRAL_PASSWORD:-}
      # Google OAuth (leave unset to run in open/local mode — see the README).
      ISSUES_GOOGLE_CLIENT_ID: ${ISSUES_GOOGLE_CLIENT_ID:-}
      ISSUES_GOOGLE_CLIENT_SECRET: ${ISSUES_GOOGLE_CLIENT_SECRET:-}
      # Token for GitHub API calls (import, github-ci checks).
      ISSUES_GITHUB_TOKEN: ${ISSUES_GITHUB_TOKEN:-}
      # Background check-sweep interval in seconds; 0 disables it.
      ISSUES_CHECK_INTERVAL: ${ISSUES_CHECK_INTERVAL:-0}
      # Set (to any value) to enable POST /api/auth/dev-login. Do not set this in production.
      ISSUES_DEV_LOGIN: ${ISSUES_DEV_LOGIN:-}
    volumes:
      - taxis-data:/data
    # ISSUES_HOST/PORT/DB/FRONTEND_DIR are set in the image itself (see Dockerfile) and don't need
    # overriding here; HOST_PORT above only controls which host port they're published on.

volumes:
  taxis-data:
